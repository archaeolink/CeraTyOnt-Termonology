# ============================================================================
# CeraTyOnt Terminology — Configuration
# ----------------------------------------------------------------------------
# Change paths, base URIs, column names here — NOT in the Python code.
# ============================================================================

# --- Namespaces & base URIs ---
namespaces:
  base_uri: "http://www.w3id.org/archlink/terms/ceratyont-terminology/"
  scheme_iri: "http://www.w3id.org/archlink/terms/ceratyont-terminology/scheme"
  image_base_url: "https://raw.githubusercontent.com/archaeolink/CeraTyOnt/main/img/"
  # LADO (Linked Archaeological Data Ontology) — for feature-similarity sub-properties
  # of skos:related (hasSameRim / Footring / Roulette / Groove / Flute).
  lado_uri: "http://www.w3id.org/lado/"
  # CeraTyOnt ontology IRI — used for rdfs:seeAlso from the scheme
  ceratyont_ontology_uri: "https://raw.githubusercontent.com/archaeolink/CeraTyOnt/main/ceratyont.owl"

# --- Language tag for all labels ---
language: "en"

# --- Input CSV files (relative to the py/ folder) ---
input:
  data_dir: "../data"
  files:
    generic:     "tbllookupformsgeneric.csv"
    tradition:   "tbllookupformstradition.csv"
    service:     "tbllookupformsservices.csv"
    publisher:   "tbllookuppublisher.csv"
    potforms:    "v_ceratyont_potforms_distinct.csv"
    connections: "v_ceratyont_connections.csv"

# --- Column mappings (CSV header → logical field) ---
columns:
  generic:
    id: "id"
    label: "genericform"
  tradition:
    id: "id"
    label: "tradition"
    color: "traditioncolor"
  service:
    id: "id"
    label: "service"
    color: "servicecolor"
  publisher:
    id: "id"
    label: "publisher"
    color: "color"
  potforms:
    id: "id"
    label: "label"
    image: "image"
    publisher: "publisher"
  connections:
    id: "id"
    edgelabel: "edgelabel"
    from_id: "id_fromlookupform"
    to_id: "id_tolookupform"

# --- Edge mapping: how each `edgelabel` value translates to RDF ---
# Each mapping defines the source/target concept kinds and the property to use.
# kind="any" means: look up the ID in all lookup tables to determine concept kind.
# `lado_subproperty` is an optional project-specific sub-property of skos:related
# that preserves the specific feature-similarity semantics.
edge_mapping:
  "has tradition":
    # from can be potform OR service (CSV has both)
    from_kinds:  ["potform", "service"]
    to_kind:     "tradition"
    property:    "skos:broader"
    inverse:     "skos:narrower"
  "has generic form":
    # from can be potform OR generic (CSV has Generic-to-Generic edges too)
    from_kinds:  ["potform", "generic"]
    to_kind:     "generic"
    property:    "skos:broader"
    inverse:     "skos:narrower"
  "has service member":
    from_kinds:  ["potform"]
    to_kind:     "service"
    property:    "skos:related"  # symmetric, emitted in both directions
  "has publisher":
    # Already modelled from v_ceratyont_potforms_distinct.csv; skip here.
    skip: true
  "is same form as":
    from_kinds:  ["potform"]
    to_kind:     "potform"
    property:    "skos:exactMatch"  # symmetric
  "has same rim as":
    from_kinds: ["potform"]
    to_kind:    "potform"
    property:   "skos:related"
    lado_subproperty: "hasSameRim"
  "has same footring as":
    from_kinds: ["potform"]
    to_kind:    "potform"
    property:   "skos:related"
    lado_subproperty: "hasSameFootring"
  "has same roulette as":
    from_kinds: ["potform"]
    to_kind:    "potform"
    property:   "skos:related"
    lado_subproperty: "hasSameRoulette"
  "has same groove as":
    from_kinds: ["potform"]
    to_kind:    "potform"
    property:   "skos:related"
    lado_subproperty: "hasSameGroove"
  "has same flute as":
    from_kinds: ["potform"]
    to_kind:    "potform"
    property:   "skos:related"
    lado_subproperty: "hasSameFlute"

# --- IRI local-name prefixes (final IRI = base_uri + prefix + id) ---
iri_prefixes:
  generic:   "generic_"
  tradition: "tradition_"
  service:   "service_"
  publisher: "publisher_"
  potform:   "potform_"

# --- Facet concepts (skos:Concept acting as a branch root) ---
# Each facet concept is a top-concept of the scheme. All members of that class
# become its narrower concepts (via skos:broader on the member side).
# This creates a real tree browseable in any SKOS viewer.
facets:
  generic:
    local_name: "facet_generic_potforms"
    label:      "Generic Potforms"
    definition: "Facet grouping all generic pottery form categories (e.g. Bowl, Cup, Dish)."
  tradition:
    local_name: "facet_traditions"
    label:      "Traditions"
    definition: "Facet grouping production traditions of Samian Ware (Italian, Gaulish-Germanic-Raetian, African)."
  service:
    local_name: "facet_services"
    label:      "Services"
    definition: "Facet grouping Samian Ware tableware services (Service I, II, A, B, C, …)."
  publisher:
    local_name: "facet_publishers"
    label:      "Publishers"
    definition: "Facet grouping the typology publishers (Dragendorff, Conspectus, Curle, …). Each publisher has its specific potforms as narrower concepts."

# --- Concept-level metadata ---
# Applied to every skos:Concept in the scheme (members and facet concepts).
concept_metadata:
  # Creator is modelled as a foaf:Person with ORCID IRI.
  # The IRI is used as the dct:creator value; the Person is described once at
  # scheme-level so tools can resolve the name + ORCID from a single creator link.
  creator_iri: "https://orcid.org/0000-0002-7634-5342"
  creator_name: "Allard Mees"
  # If true, dct:created on each concept comes from the mtime of its source CSV.
  # If false, falls back to the scheme's dct:created.
  use_csv_mtime_for_created: true

# --- Generic definition templates for member concepts ---
# Placeholders: {label} = the concept's prefLabel.
# Used to fill skos:definition on each concept kind. Leave a key empty to skip.
definition_templates:
  generic:   "Generic potform category: {label}."
  tradition: "Production tradition of Samian Ware: {label}."
  service:   "Samian Ware tableware service: {label}."
  publisher: "Publisher / typology author: {label}. Defines a set of named potforms."
  potform:   "Potform type {label} as defined by its publisher."

# --- Generic scopeNote templates (usage / applicability guidance) ---
# skos:scopeNote is distinct from skos:definition: it describes when/how to use
# the concept, not what it is. Placeholder: {label}.
scope_note_templates:
  generic:   "Use to classify vessels by their general shape category. For publisher-specific type numbers, use the corresponding Potform concept instead."
  tradition: "Use to indicate the production tradition a vessel or typology belongs to. Applies to both Potforms and Services."
  service:   "Use to group Potforms that form a matching set of tableware items (plates, cups, bowls) from the same production tradition."
  publisher: "Use to attribute a Potform to the scholar or reference work that originally defined it. Potforms appear as narrower concepts under their Publisher."
  potform:   "Use for the specific potform type {label} as originally defined by its Publisher. Links to generic form, tradition and services are provided via skos:broader / skos:related."

# --- Handling of sentinel values in CSV ---
null_markers:
  - "NULL"
  - "null"
  - ""
  - "N/A"

# --- Output ---
output:
  dir: "../output"
  skos_file: "ceratyont_skos.ttl"
  validation_report_ttl: "validation_report.ttl"    # machine-readable SHACL report
  validation_report_md:  "validation_report.md"     # human-readable summary

# --- SHACL shapes (ordered; evaluated together against the data graph) ---
shapes:
  # Primary: SkoHub generic SKOS shapes (SHACL from skohub.io)
  - "shapes/skohub_shacl.ttl"
  # Secondary: CeraTyOnt-specific structural rules (IRI depictions, no self-broader, etc.)
  - "shapes/ceratyont_shapes.ttl"

# --- Concept scheme metadata ---
# NOTE: SkoHub SHACL requires dct:license (IRI) and vann:preferredNamespaceUri (string)
# to avoid Warnings; dct:title / dct:description must be language-tagged literals.
scheme:
  title: "CeraTyOnt Terminology"
  description: "SKOS terminology for ceramic typologies (Samian Ware), derived from the CeraTyOnt ontology."
  creator: "Florian Thiery"
  contributor: "Allard Mees"
  publisher: "RGZM"
  rights: "CC BY 4.0"
  license: "https://creativecommons.org/licenses/by/4.0/"
  preferred_namespace_uri: "http://www.w3id.org/archlink/terms/ceratyont-terminology/"
  preferred_namespace_prefix: "ceratyont"
  version: "0.1.0"
  # ISO-8601 dates (YYYY-MM-DD). Leave created/issued fixed; modified is auto-updated at build time.
  created: "2026-04-22"      # when this SKOS terminology was first generated
  issued:  "2026-04-22"      # when it was first published — update on release
  # Canonical source ontology the terminology is derived from
  source_ontology: "https://raw.githubusercontent.com/archaeolink/CeraTyOnt/main/ceratyont.owl"

# --- Build behaviour ---
build:
  # Auto-flip "suspicious" Generic→Generic edges where the from-label is a prefix
  # of the to-label (e.g. "Cup → Cup Rouletted" becomes "Cup Rouletted → Cup").
  # A skos:historyNote is added to the flipped concept.
  auto_flip_suspicious_generic_edges: true
  # Safety net — abort the build if more than this many flips would be made.
  # Protects you in case the source data changes in a way that breaks the heuristic.
  auto_flip_max: 5
  # Emit skos:notation and skos:altLabel ("<publisher-abbreviation> <form-label>")
  # on Potform concepts. Abbreviations come from py/abbreviations.py.
  emit_potform_notation: true
